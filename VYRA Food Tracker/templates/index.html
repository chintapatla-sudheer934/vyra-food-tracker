<!DOCTYPE html>
<html>
<head>
    <title>Food Delivery Tracker</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="container">
        <img src="/static/images/logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <h1>🍕 Food Delivery Tracker</h1>
        <p>Order your favorite food and track it in real-time!</p>
        
        <button class="btn menu" onclick="location.href='/menu'">🍔 View Menu</button>
        <button class="btn order" onclick="location.href='/place_order_page'">🛒 Place Order</button>
        <button class="btn track" onclick="location.href='/track'">📦 Track Order</button>
        <button class="btn" style="background: #f59e0b; color: white;" onclick="location.href='/cart_page'">🛍️ View Cart</button>
    </div>

</body>
</html>
