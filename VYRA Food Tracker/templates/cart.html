<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .cart-container { max-width: 900px; margin: 0 auto; }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .cart-count {
            background: #ef4444;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .cart-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
        }
        
        .cart-table td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .cart-table tr:hover {
            background: #f8f9fa;
        }
        
        .item-name {
            font-weight: bold;
            color: #333;
        }
        
        .item-restaurant {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .qty-btn-cart {
            background: #3b82f6;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .qty-btn-cart:hover {
            background: #2563eb;
            transform: scale(1.05);
        }
        
        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .remove-btn:hover {
            background: #dc2626;
        }
        
        .cart-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
        }
        
        .checkout-btn {
            background: #22c55e;
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        
        .checkout-btn:hover {
            background: #16a34a;
            transform: scale(1.02);
        }
        
        .empty-cart {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
        }
        
        .empty-cart h2 {
            color: #666;
        }
        
        .continue-shopping {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        
        .user-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .success-message {
            background: #22c55e;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
        
        .error-message {
            background: #ef4444;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container cart-container">
        <div class="cart-header">
            <h1>🛒 My Cart</h1>
            <span class="cart-count" id="cartCount">0 items</span>
        </div>
        
        <div class="user-info">
            <label>👤 User ID:</label>
            <input type="number" id="userId" value="23" style="padding: 8px; margin-left: 10px; border-radius: 6px; border: 1px solid #ddd;">
            <button onclick="loadCart()" style="margin-left: 10px; padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer;">Load Cart</button>
        </div>
        
        <div id="cartContent">
            <div class="empty-cart">
                <h2>🛒 Your cart is empty</h2>
                <p>Add items from the menu to get started!</p>
                <button class="continue-shopping" onclick="location.href='/place_order_page'">Continue Shopping →</button>
            </div>
        </div>
        
        <button class="btn track" onclick="location.href='/'">⬅ Back to Home</button>
    </div>
    
    <div id="message"></div>

    <script>
        let cartData = [];
        
        function loadCart() {
            const userId = document.getElementById("userId").value;
            if (!userId) {
                showMessage("❌ Please enter User ID", "error");
                return;
            }
            
            fetch(`/api/cart/${userId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showMessage("Error loading cart", "error");
                        return;
                    }
                    cartData = data;
                    displayCart(data, userId);
                })
                .catch(error => {
                    console.error("Error:", error);
                    showMessage("Failed to load cart", "error");
                });
        }
        
        function displayCart(items, userId) {
            const cartDiv = document.getElementById("cartContent");
            
            if (items.length === 0) {
                cartDiv.innerHTML = `
                    <div class="empty-cart">
                        <h2>🛒 Your cart is empty</h2>
                        <p>Add items from the menu to get started!</p>
                        <button class="continue-shopping" onclick="location.href='/place_order_page'">Continue Shopping →</button>
                    </div>
                `;
                document.getElementById("cartCount").innerText = "0 items";
                return;
            }
            
            let total = 0;
            let totalItems = 0;
            
            let html = `
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Restaurant</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            items.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                totalItems += item.quantity;
                
                html += `
                    <tr>
                        <td class="item-name">${item.item_name}</td>
                        <td class="item-restaurant">${item.restaurant}</td>
                        <td>₹${parseFloat(item.price).toFixed(2)}</td>
                        <td>
                            <div class="quantity-controls">
                                <button class="qty-btn-cart" onclick="updateQuantity(${item.cart_id}, ${item.quantity - 1})">-</button>
                                <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
                                <button class="qty-btn-cart" onclick="updateQuantity(${item.cart_id}, ${item.quantity + 1})">+</button>
                            </div>
                        </td>
                        <td>₹${itemTotal.toFixed(2)}</td>
                        <td>
                            <button class="remove-btn" onclick="removeItem(${item.cart_id})">Remove</button>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
                
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Total Items:</span>
                        <span>${totalItems}</span>
                    </div>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span>₹${total.toFixed(2)}</span>
                    </div>
                    <div class="summary-row" style="font-size: 20px; font-weight: bold;">
                        <span>Grand Total:</span>
                        <span>₹${total.toFixed(2)}</span>
                    </div>
                    <button class="checkout-btn" onclick="checkout()">✅ Proceed to Checkout</button>
                </div>
            `;
            
            cartDiv.innerHTML = html;
            document.getElementById("cartCount").innerText = `${totalItems} items`;
            
            
            localStorage.setItem('cartCount', totalItems);
        }
        
        function updateQuantity(cartId, newQuantity) {
            if (newQuantity < 0) return;
            
            fetch("/api/cart/update", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ cart_id: cartId, quantity: newQuantity })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showMessage("Error updating cart", "error");
                } else {
                    loadCart(); 
                }
            })
            .catch(error => {
                console.error("Error:", error);
                showMessage("Failed to update cart", "error");
            });
        }
        
        function removeItem(cartId) {
            if (confirm("Remove this item from cart?")) {
                fetch(`/api/cart/remove/${cartId}`, {
                    method: "DELETE"
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showMessage("Error removing item", "error");
                    } else {
                        showMessage("Item removed from cart!", "success");
                        loadCart(); 
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    showMessage("Failed to remove item", "error");
                });
            }
        }
        
        function checkout() {
            const userId = document.getElementById("userId").value;
            
            if (confirm("Proceed to checkout? Your order will be placed.")) {
                fetch("/api/cart/checkout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: parseInt(userId) })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showMessage(`❌ ${data.error}`, "error");
                    } else {
                        showMessage(`✅ ${data.message} Order ID: ${data.order_id} | Total: ₹${data.total_amount.toFixed(2)}`, "success");
                        loadCart(); 
                        localStorage.setItem('cartCount', 0);
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    showMessage("Checkout failed", "error");
                });
            }
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById("message");
            messageDiv.innerHTML = `<div class="${type}-message">${msg}</div>`;
            setTimeout(() => { messageDiv.innerHTML = ""; }, 5000);
        }
        
        
        document.getElementById("userId").value = 23;
        loadCart();
    </script>

</body>
</html>
